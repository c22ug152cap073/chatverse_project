<!DOCTYPE html>
<html>
<head>

<title>ChatVerse AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.chat-box{
width:400px;
height:550px;
background:white;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
padding:20px;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
}

.user{
text-align:right;
margin:10px;
}

.bot{
text-align:left;
margin:10px;
color:#2a5298;
}

input{
border-radius:20px;
}

button{
border-radius:20px;
}

</style>

</head>

<body>

<div class="chat-box">

<h4 class="text-center">ChatVerse AI</h4>

<div class="messages">

{% if response %}
<div class="bot">🤖 {{response}}</div>
{% endif %}

</div>

<form method="post">

{% csrf_token %}

<div class="input-group">

<input type="text" name="message" class="form-control" placeholder="Ask something...">

<button class="btn btn-primary">Send</button>

</div>

</form>

</div>

</body>

</html>
