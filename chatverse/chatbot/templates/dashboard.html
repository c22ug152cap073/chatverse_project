<!DOCTYPE html>
<html>
<head>

<title>ChatVerse Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f2027;
color:white;
font-family:Segoe UI;
padding:40px;
}

.card{
background:rgba(255,255,255,0.1);
border-radius:15px;
padding:20px;
}

</style>

</head>

<body>

<h2>📊 ChatVerse Analytics Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card">
<h4>Total Conversations</h4>
<h2>{{total_chats}}</h2>
</div>
</div>

</div>

<hr>

<h4>🔥 Most Asked Questions</h4>

<table class="table table-dark table-striped">

<tr>
<th>Question</th>
<th>Count</th>
</tr>

{% for q in common_questions %}

<tr>
<td>{{q.user_message}}</td>
<td>{{q.count}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
